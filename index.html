<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Оптимизируем вьюпорт под экраны iPhone с челкой и Dynamic Island (viewport-fit=cover) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>iOS Music Player</title>

    <!-- Настройки режима PWA для iOS (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Делаем статус-бар прозрачным, чтобы плеер затекал под челку как нативное приложение -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iPlayer" />

    <!-- 
      Премиальная iOS-иконка (Векторный SVG в формате Data URI).
      Дизайн: Глубокий темный градиент с неоновым фиолетово-розовым свечением наушников, эквалайзера и винила.
    -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180' width='180' height='180'><defs><linearGradient id='bg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%230b0f19'/><stop offset='100%25' stop-color='%23020617'/></linearGradient><linearGradient id='neonGlow' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23a855f7'/><stop offset='50%25' stop-color='%236366f1'/><stop offset='100%25' stop-color='%23ec4899'/></linearGradient><filter id='blur' x='-20%25' y='-20%25' width='140%25' height='140%25'><feDropShadow dx='0' dy='6' stdDeviation='10' flood-color='%236366f1' flood-opacity='0.6'/></filter></defs><rect width='180' height='180' rx='40' fill='url(%23bg)'/><circle cx='90' cy='90' r='48' fill='none' stroke='url(%23neonGlow)' stroke-width='4' filter='url(%23blur)'/><circle cx='90' cy='90' r='34' fill='none' stroke='%231e293b' stroke-width='2' stroke-dasharray='10 6'/><path d='M58 92 A32 32 0 0 1 122 92' fill='none' stroke='url(%23neonGlow)' stroke-width='6' stroke-linecap='round' filter='url(%23blur)'/><rect x='50' y='82' width='10' height='22' rx='5' fill='url(%23neonGlow)' filter='url(%23blur)'/><rect x='120' y='82' width='10' height='22' rx='5' fill='url(%23neonGlow)' filter='url(%23blur)'/><path d='M80 90 L80 100 M90 84 L90 106 M100 88 L100 102' stroke='%23f472b6' stroke-width='3' stroke-linecap='round' filter='url(%23blur)'/></svg>" />

    <!-- Подключение манифеста PWA -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Цвет темы для системных элементов -->
    <meta name="theme-color" content="#090d16" />
  </head>
  <body class="bg-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</html>
